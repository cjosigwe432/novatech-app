<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.phone {
  width: 340px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 30px;
}

h1 {
  margin: 10px 0;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #005eff, #7b00ff);
  color: white;
  cursor: pointer;
}

.section {
  margin-top: 20px;
}

.recipients {
  display: flex;
  gap: 10px;
}

.user {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 15px;
  text-align: center;
  flex: 1;
}

canvas {
  margin-top: 10px;
  background: #fff;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="phone">

  <h3>Welcome Back</h3>
  <p>Hi, User</p>

  <h1 id="balance">$17,298.92</h1>

  <div class="buttons">
    <button onclick="sendMoney()">Send</button>
    <button onclick="requestMoney()">Request</button>
  </div>

  <!-- RECIPIENTS -->
  <div class="section">
    <h4>Recipients</h4>
    <div class="recipients">
      <div class="user">Alex<br>$90</div>
      <div class="user">Hena<br>$100</div>
      <div class="user">William<br>$1200</div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div class="section">
    <h4>Analytics</h4>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
<script>
function sendMoney() {
  alert("Send money 💸");
}

function requestMoney() {
  alert("Request money 💰");
}
</script>

</body>
</html>
