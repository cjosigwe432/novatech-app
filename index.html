<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop UI</title>
<link rel="stylesheet" href="style.css">
  <style>
  body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: white;
}

.nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 50px;
  background: #eee;
  border-radius: 20px;
  margin: 20px;
}

.hero img {
  width: 300px;
}

.hero h1 {
  font-size: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 15px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.black { background: black; }
.yellow { background: #f4b400; }
.red { background: #ff3b3b; }
.gray { background: #999; }
.green { background: #00c853; }
.blue { background: #2979ff; }

/* SALE */
.sale {
  background: red;
  color: white;
  margin: 20px;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: black;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<header class="nav">
  <h2>PHLOX</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h4>Beats Solo</h4>
    <h1>Wireless Headphone</h1>
    <button>Shop Now</button>
  </div>
  
<img src="IMG_1391.JPG" alt="Image 1">

<img src="IMG_1393.JPG" alt="Image 2">
  
  <img src="https://images.unsplash.com/photo-1518444028785-8f0c6b4dcb8c" alt="">
</section>

<!-- CATEGORIES -->
<section class="grid">

  <div class="card black">
    <h3>Earphone</h3>
  </div>

  <div class="card yellow">
    <h3>Wear Gadgets</h3>
  </div>

  <div class="card red">
    <h3>Laptop</h3>
  </div>

  <div class="card gray">
    <h3>Console</h3>
  </div>

  <div class="card green">
    <h3>Oculus</h3>
  </div>

  <div class="card blue">
    <h3>Speaker</h3>
  </div>

</section>

<!-- SALE -->
<section class="sale">
  <h1>Summer Sale</h1>
  <button>Shop</button>
</section>

<script src="app.js"></script>
<script>
console.log("Website Loaded");

// Example interaction
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {
    alert("Category clicked");
  });
});
</script>

</body>
</html>
