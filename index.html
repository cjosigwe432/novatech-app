<!DOCTYPE html>
<html>
<head>
  <title>Real Estate</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: white;
    }

    .nav button {
      padding: 10px 20px;
      border: 1px solid black;
      background: none;
    }

    /* HERO */
    .hero {
      padding: 80px;
      background: url('https://images.unsplash.com/photo-1560185007-c5ca9d2c014d') no-repeat center/cover;
      color: white;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero button {
      padding: 12px 25px;
      background: black;
      color: white;
      border: none;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      width: 300px;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<div class="nav">
  <h2>La Maison</h2>
  <button>Find A House</button>
</div>

<div class="hero">
  <h1>Find A House That Suits You</h1>
  <button>Get Started</button>
</div>

<div class="cards">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <h3>Lagos House</h3>
    <p>₦100,000,000</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
    <h3>Modern Home</h3>
    <p>₦200,000,000</p>
  </div>
</div>

</body>
</html>
